name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pin the code-pact CLI version so a registry-side bump can't change CI behavior on us.
  # Bumping here is the deliberate way to adopt a newer version; also re-run
  # `npx -y code-pact@<version> adapter upgrade claude-code --write` locally so the
  # committed adapter manifest matches.
  CODE_PACT_VERSION: 2.0.0

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Build before typecheck: cross-package types resolve from each dependency's built dist.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:runtime-safety
      # Publish viability: pack the real `fairux` tarball, install it into a clean temp dir, and run
      # it (HTML/JSX/TSX + explicit --config). Catches workspace: leaks, bundle gaps, missing deps.
      - run: pnpm pack:smoke
      # Governance gate: design / progress / manifest integrity. Non-strict — advisories
      # (e.g. an intentional MODEL_MAP pin) inform without blocking; real errors do block.
      - name: code-pact validate
        run: npx -y "code-pact@${CODE_PACT_VERSION}" validate --json
      - name: code-pact plan lint
        run: npx -y "code-pact@${CODE_PACT_VERSION}" plan lint --json
