name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pin the code-pact CLI version so a registry-side bump can't change CI behavior on us.
  # Bumping here is the deliberate way to adopt a newer version; also re-run
  # `npx -y code-pact@<version> adapter upgrade claude-code --write` locally so the
  # committed adapter manifest matches.
  CODE_PACT_VERSION: 2.0.0

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Build before typecheck: cross-package types resolve from each dependency's built dist.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:runtime-safety
      # Governance gate: design / progress / manifest integrity. Non-strict — advisories
      # (e.g. an intentional MODEL_MAP pin) inform without blocking; real errors do block.
      - name: code-pact validate
        run: pnpm exec code-pact validate --json
      - name: code-pact plan lint
        run: pnpm exec code-pact plan lint --json

  # Publish viability, on its OWN job so it can't lean on the `verify` job's `pnpm build`. The smoke
  # test itself deletes every dist and packs from a clean state (prepack must rebuild), then installs
  # the tarball into a temp dir and runs HTML/JSX/TSX + an explicit fairux.config.ts. Run on the
  # declared minimum Node (22) AND the current LTS (24) so `engines.node: ">=22"` is actually
  # exercised. Node 20 is EOL, so it's no longer a supported runtime (see P10-T3).
  pack-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:smoke

  # Targeted Windows job: verify config boundary behaviour on the native Windows filesystem.
  # Full pack smoke is not duplicated here; this job focuses on config identity, path semantics,
  # and CLI/VS Code integration that must work on the platform users actually run.
  config-windows:
    name: config-windows
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "@fairux/config-node..." build
      - run: pnpm exec vitest run packages/config-node/test
      - run: pnpm --filter "fairux..." build
      - run: pnpm exec vitest run apps/cli/test/config.test.ts
      - run: pnpm exec vitest run apps/cli/test/cli-security.test.ts
      - run: pnpm exec vitest run apps/vscode-extension/test

  # Check markdown links in docs and design/decisions to prevent broken relative links.
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check markdown links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --offline
            "docs/**/*.md"
            "design/decisions/**/*.md"
            "README.md"
            "SECURITY.md"
