<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Checkout</title>
  </head>
  <body>
    <h1>Checkout</h1>
    <section class="cart">
      <p>Premium headphones</p>
      <p class="price">$199.00</p>

      <p>Wait! Add a 2-year warranty?</p>
      <button>Yes, add it</button>
    </div>
  </body>
</html>
