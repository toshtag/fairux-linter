  - "pnpm build"
  - "pnpm typecheck"
  - "pnpm test"
  - "pnpm check:runtime-safety"
  - "pnpm pack:smoke"
  - "pnpm pack:smoke:sdk"
  - "pnpm exec vitest run packages/rules/test"
  - "pnpm exec vitest run packages/core/test/scanner-policy.test.ts packages/core/test/rule-pack.test.ts packages/core/test/scan.test.ts"
  - "pnpm exec vitest run packages/sdk/test"
  - "pnpm exec vitest run packages/core/test/scanner-policy.test.ts packages/core/test/rule-pack.test.ts packages/sdk/test/sdk.test.ts"
  - "pnpm exec vitest run packages/core/test/rule-result.test.ts packages/core/test/scan.test.ts packages/sdk/test/sdk.test.ts"
  - "pnpm exec vitest run tests/unit/workflows/node-contract.test.ts"
  - "pnpm exec vitest run packages/html/test/dos-resistance.test.ts packages/ast/test/dos-resistance.test.ts packages/dom/test/parse.test.ts"
  - "Node 24.15.0: pnpm lint, pnpm build, pnpm typecheck, pnpm test, pnpm check:runtime-safety"
  - "Node 24.15.0: pnpm pack:smoke, pnpm pack:smoke:sdk"
  - "Node 22.20.0 local stand-in for the 22.18.0 support line: pnpm pack:smoke, pnpm pack:smoke:sdk"
  - "CI jobs: verify, pack-smoke (22.18.0), pack-smoke (24.11.0), sdk-pack-smoke (22.18.0), sdk-pack-smoke (24.11.0), config-windows, link-check"
  - "pnpm exec code-pact validate --json"
  - "pnpm exec code-pact plan lint --json"
