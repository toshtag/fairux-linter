id: P13
name: Taxonomy and rule governance
weight: 14
confidence: medium
risk: medium
status: in_progress
objective: Define the public dark-pattern taxonomy, rule maturity model,
  official-source mappings, jurisdiction metadata, capability requirements,
  deprecation policy, and corpus review process.
definition_of_done:
  - Taxonomy distinguishes pattern categories, capabilities, and evidence
    requirements
  - Built-in categories remain stable while external RulePacks can declare
    namespaced categories
  - Locale and page-context extension rules are documented before public
    ecosystem expansion
  - P13-T2 taxonomy composition is deterministic across RulePack ordering,
    category parents, cycles, scoped npm pack namespaces, and experimental-pack
    exclusion
  - P13-T2 exposes immutable composed taxonomy metadata through core and SDK
    scanner APIs
  - P13-T2 HTML and DOM SDK APIs accept declared external page-context signals
    with host-locale-independent canonical ordering
  - P13-T2 JSON, Markdown, SARIF, and packed SDK consumer tests preserve
    external category and page-context contracts
  - P13-T2 rejects case-insensitive duplicate RFC 5646 variant subtags for both
    scanner locales and RulePack dictionary keys
  - Rules carry maturity and jurisdiction metadata
  - Official-source mappings are documented without overstating legal conclusions
  - Corpus and false-positive review workflow is documented
verification:
  commands:
    - pnpm lint
    - pnpm build
    - pnpm typecheck
    - pnpm test
    - pnpm check:runtime-safety
    - pnpm pack:smoke:sdk
    - pnpm exec code-pact validate --json
    - pnpm exec code-pact plan lint --json
tasks:
  - id: P13-T1
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: medium
    status: in_progress
    description: Umbrella for the rule governance contract, split into P13-T5
      through P13-T7 so ADR, public type implementation, and built-in migration
      can ship as separate PRs before the SDK beta release.
    reads:
      - packages/rules/src/**
      - design/**
    writes:
      - packages/core/src/types.ts
      - packages/rules/src/**
      - docs/**
      - design/decisions/P13-*.md
