id: P13
name: Taxonomy and rule governance
weight: 14
confidence: medium
risk: medium
status: in_progress
objective:
  "Define the public dark-pattern taxonomy, rule maturity model, official-source
  mappings, jurisdiction metadata, capability requirements, deprecation policy,
  and corpus review process."
definition_of_done:
  - "Taxonomy distinguishes pattern categories, capabilities, and evidence requirements"
  - "Built-in categories remain stable while external RulePacks can declare namespaced categories"
  - "Locale and page-context extension rules are documented before public ecosystem expansion"
  - "P13-T2 taxonomy composition is deterministic across RulePack ordering, category parents, cycles, scoped npm pack namespaces, and experimental-pack exclusion"
  - "P13-T2 exposes immutable composed taxonomy metadata through core and SDK scanner APIs"
  - "P13-T2 HTML and DOM SDK APIs accept declared external page-context signals with host-locale-independent canonical ordering"
  - "P13-T2 JSON, Markdown, SARIF, and packed SDK consumer tests preserve external category and page-context contracts"
  - "P13-T2 rejects case-insensitive duplicate RFC 5646 variant subtags for both scanner locales and RulePack dictionary keys"
  - "Rules carry maturity and jurisdiction metadata"
  - "Official-source mappings are documented without overstating legal conclusions"
  - "Corpus and false-positive review workflow is documented"
verification:
  commands:
    - pnpm lint
    - pnpm build
    - pnpm typecheck
    - pnpm test
    - pnpm check:runtime-safety
    - pnpm pack:smoke:sdk
    - pnpm exec code-pact validate --json
    - pnpm exec code-pact plan lint --json
evidence:
  - "Implementation commit verified: 9b4ec17376a3aeb51b0b673d4d967b7f247f2cdb"
  - "Node 22.18.0 with pnpm 10.33.2: pnpm install --frozen-lockfile, pnpm lint, pnpm build, pnpm typecheck, pnpm test (479 tests), pnpm check:runtime-safety"
  - "Node 22.18.0 with pnpm 10.33.2: pnpm pack:smoke, pnpm pack:smoke:sdk, pnpm exec code-pact validate --json, pnpm exec code-pact plan lint --json"
  - "Node 22.18.0 focused tests: locale, page-context, rule-pack, scanner-policy, SDK, public type parity, JSON, Markdown, and SARIF tests passed (126 tests)"
  - "Node 24.15.0 with pnpm 10.33.2: pnpm install --frozen-lockfile, pnpm lint, pnpm build, pnpm typecheck, pnpm test (479 tests), pnpm check:runtime-safety"
  - "Node 24.15.0 with pnpm 10.33.2: pnpm pack:smoke, pnpm pack:smoke:sdk, pnpm exec code-pact validate --json, pnpm exec code-pact plan lint --json"
  - "Node 24.15.0 focused tests: locale, page-context, rule-pack, scanner-policy, SDK, public type parity, JSON, Markdown, and SARIF tests passed (126 tests)"
